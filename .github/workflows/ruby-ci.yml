name: RubyCI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

env:
  RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
  REDIS_URL: redis://localhost:6379/0
 
jobs:
  rubocop: 
    name: Rubocop
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run Rubocop
        run: |
          bundle exec rubocop

  security:
    name: Security
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run brakeman
        run: |
          bundle exec brakeman -w3
      - name: Run bundler-audit
        run: |
          bundle exec bundle-audit check --update

  tests:
    name: Tests
    env:
      RAILS_ENV: test
      BUNDLE_GEMS__CONTRIBSYS__COM: ${{ secrets.BUNDLE_GEMS__CONTRIBSYS__COM }}

    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - uses: actions/checkout@v2

      - name: Start PostgreSQL with PostGIS + pgvector
        run: |
          docker run --name postgres -d \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            --tmpfs /var/lib/postgresql/data \
            postgis/postgis:14-3.3
          until docker exec postgres pg_isready -U postgres; do sleep 1; done
          docker exec postgres bash -c "
            apt-get update -qq \
            && apt-get install -y --no-install-recommends build-essential git postgresql-server-dev-14 \
            && git clone --branch v0.8.0 https://github.com/pgvector/pgvector.git /tmp/pgvector \
            && cd /tmp/pgvector && make && make install \
            && rm -rf /tmp/pgvector
          "

      - uses: actions/setup-node@v3
        with:
          node-version: 20.17.0
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ## runs 'bundle install' and caches installed gems automatically
          bundler-cache: true
        env:
          BUNDLE_GEMS__CONTRIBSYS__COM: ${{ secrets.BUNDLE_GEMS__CONTRIBSYS__COM }}
      - name: Create DB
        run: |
          bin/rails db:prepare
      - name: Install Node packages
        run: |
          bin/yarn install --ignore-engines
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - name: Run tests
        run: |
          bundle exec rspec --fail-fast

