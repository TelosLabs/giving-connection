# Smart Match Engine — City Centroids
#
# Provides center-point coordinates for cities offered in the quiz location step.
# Used by SimilarityQuery to convert a user's city selection into lat/lon for
# PostGIS distance filtering (ST_DWithin).
#
# Note: The locations table has no city/state columns — only an address string
# and lat/lon coordinates. Distance-based filtering via these centroids is the
# primary mechanism for location matching.
#
# TODO: Validate city list against production locations data to ensure coverage
# of cities where organizations actually operate.

