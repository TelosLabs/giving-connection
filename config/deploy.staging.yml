# Staging destination — deploy with: kamal deploy -d staging

servers:
  web:
    hosts:
      - 138.197.90.4
    options:
      memory: 1g

  worker:
    hosts:
      - 138.197.90.4
    cmd: bundle exec sidekiq
    options:
      memory: 512m

  clock:
    hosts:
      - 138.197.90.4
    cmd: bundle exec clockwork config/clock.rb
    options:
      memory: 256m

proxy:
  ssl: true
  host: staging.givingconnection.org
  app_port: 3000
  healthcheck:
    interval: 3
    path: /up
    timeout: 10

env:
  clear:
    RAILS_ENV: staging
    WEB_CONCURRENCY: "1"

# Python embedding service for Smart Match feature.
# SECURITY: Bound to 127.0.0.1 only — not accessible from the public internet.
#
# Memory: bge-large-en-v1.5 ~1.3 GB on disk plus torch/transformers runtime
# pushes RSS to ~2 GB. 1g caps OOM the model at startup — staging needs
# at least 2.5g (matches production) or switch to bge-base-en-v1.5 (768-D)
# which then requires a schema migration to vector(768).
#
# Healthcheck: /health returns 503 until the model finishes loading. Kamal
# polls Docker's healthcheck before swinging traffic onto a new container.
accessories:
  embedding-api:
    image: ghcr.io/teloslabs/gc-embedding-api
    host: 138.197.90.4
    port: "127.0.0.1:8000:8000"
    options:
      memory: 2.5g
      health-cmd: 'python -c "import urllib.request,sys; r=urllib.request.urlopen(''http://127.0.0.1:8000/health'', timeout=2); sys.exit(0 if r.status==200 else 1)"'
      health-interval: 15s
      health-timeout: 3s
      health-retries: 30
      health-start-period: 90s
    env:
      clear:
        PYTHONUNBUFFERED: "1"
