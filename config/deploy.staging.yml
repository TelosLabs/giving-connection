# Staging destination — deploy with: kamal deploy -d staging

servers:
  web:
    hosts:
      - 138.197.90.4
    options:
      memory: 1g

  worker:
    hosts:
      - 138.197.90.4
    cmd: bundle exec sidekiq
    options:
      memory: 512m

  clock:
    hosts:
      - 138.197.90.4
    cmd: bundle exec clockwork config/clock.rb
    options:
      memory: 256m

proxy:
  ssl: false
  host: 138.197.90.4
  app_port: 3000
  healthcheck:
    interval: 3
    path: /up
    timeout: 10

env:
  clear:
    RAILS_ENV: staging
    WEB_CONCURRENCY: "1"

# Python embedding service for Smart Match feature.
# SECURITY: Bound to 127.0.0.1 only — not accessible from the public internet.
accessories:
  embedding-api:
    image: ghcr.io/teloslabs/gc-embedding-api
    host: 138.197.90.4
    port: "127.0.0.1:8000:8000"
    options:
      memory: 1g
    env:
      clear:
        PYTHONUNBUFFERED: "1"
