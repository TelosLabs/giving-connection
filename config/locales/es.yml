# Spanish translations for Smart Match. Tone matches the bilingual content
# convention already used in app/models/organization.rb (mission_statement_es,
# vision_statement_es, tagline_es): direct, second-person informal ("tú"),
# capitalized titles. Translator's note: deeper copy inside individual quiz
# step partials (app/views/smart_match/quizzes/steps/_*.html.erb) is still
# hardcoded English in this pass; localize in a follow-up translation PR.

es:
  hello: "Hola mundo"
  smart_match:
    landing:
      hero:
        title: "Bienvenido a Smart Match"
        body: "Una función de Giving Connection diseñada para ayudarte a identificar rápidamente organizaciones sin fines de lucro alineadas con tus metas, situación y ubicación, sin la fatiga de búsquedas interminables."
