#
# NTEE prefix reference (from Organizations::Constants::NTEE_CODE):
#   A=Arts, B=Education, C=Environment, D=Animals, E=Health, F=Mental Health,
#   G=Diseases, H=Medical Research, I=Crime/Legal, J=Employment, K=Food,
#   L=Housing, M=Safety, N=Recreation, O=Youth, P=Human Services,
#   Q=International, R=Civil Rights, S=Community Dev, T=Philanthropy,
#   U=Science, V=Social Science, W=Public Benefit, X=Religion, Y=Mutual Benefit
# ---------------------------------------------------------------------------
