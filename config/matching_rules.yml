# Smart Match Engine — Matching Rules Configuration
#
# This file defines the rules used by the smart match engine to score and rank
# organizations against user quiz responses.
#
# Cause names MUST match Organizations::Constants::CAUSES_AND_SERVICES keys exactly.
# NTEE prefixes reference the letter codes from Organizations::Constants::NTEE_CODE.

# ---------------------------------------------------------------------------
# Allowed states for the quiz location step
# ---------------------------------------------------------------------------
allowed_states:
  - NJ
  - CA
  - TN

# ---------------------------------------------------------------------------
# Radius (in miles) by user-selected travel willingness
# Used by SimilarityQuery for PostGIS ST_DWithin filtering.
# Progressive expansion: if fewer than 3 results, expand to next bucket.
# ---------------------------------------------------------------------------
radius_by_travel_bucket:
  nearby: 5        # "Close to me"
  moderate: 15     # "Within a short drive"
  far: 30          # "I'll travel for the right org"
  statewide: 100   # "Anywhere in my state"

# ---------------------------------------------------------------------------
# Scoring weights — must sum to 1.0
# ---------------------------------------------------------------------------
scoring:
  weights:
    embedding_similarity: 0.70
    attribute_bonus: 0.20
    distance: 0.10
  # Minimum number of results to return (triggers radius expansion if not met)
  min_results: 3
  # Maximum results to display
  max_results: 20

# ---------------------------------------------------------------------------
# Attribute bonus weights — applied within the 20% attribute_bonus bucket
# Each sub-weight is relative (they are normalized internally).
# ---------------------------------------------------------------------------
attribute_weights:
  cause_match: 5        # Org shares a cause the user selected
  beneficiary_match: 3  # Org serves a beneficiary group matching user profile
  scope_match: 2        # Org scope_of_work aligns with user travel preference
  service_match: 1      # Org provides a specific service the user selected

# ---------------------------------------------------------------------------
# Quiz configuration — defines the cause subsets per user type
# Service seekers see all 36 causes; volunteers and donors see a curated 14.
# ---------------------------------------------------------------------------
quiz:
  user_types:
    - service_seeker
    - volunteer
    - donor

  # All 36 causes (service seeker path)
  all_causes:
    - Advocacy
    - Animals
    - Arts & Culture
    - Children & Family Services
    - Clothing & Living Essentials
    - Community & Economic Development
    - Disability Services
    - Disaster Relief & Preparedness
    - Drug & Alcohol Treatment
    - Education
    - Emergency & Safety
    - Employment
    - Environment
    - Faith-Based
    - Health
    - Housing & Homelessness
    - Human & Social Services
    - Hunger & Food Security
    - Immigrant & Refugee
    - Inmate & Formerly Incarcerated
    - International
    - Justice & Legal Services
    - LGBTQ+
    - Media & Broadcasting
    - Mental Health
    - Philanthropy
    - Race & Ethnicity
    - Research & Public Policy
    - Science & Technology
    - Seniors
    - Social Sciences
    - Sports & Recreation
    - Transportation
    - Veteran & Military
    - Youth Development

  # TODO: Confirm this 14-cause subset with Nathaly's branch or product team.
  # These are the causes shown to volunteers and donors.
  volunteer_donor_causes:
    - Animals
    - Arts & Culture
    - Children & Family Services
    - Disability Services
    - Education
    - Environment
    - Health
    - Housing & Homelessness
    - Hunger & Food Security
    - Immigrant & Refugee
    - Mental Health
    - Seniors
    - Veteran & Military
    - Youth Development

# ---------------------------------------------------------------------------
# Cause synonyms and NTEE prefix mappings
